<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLauncher Omni-Sim 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --bg: #02040a;
            --surface: rgba(13, 17, 23, 0.8);
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.4);
            --success: #00ff95;
            --error: #ff0055;
            --warning: #ffcc00;
            --text: #e6edf3;
            --mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        .scene {
            width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            transform-style: preserve-3d;
            transform: rotateX(5deg);
        }

        .viewport {
            background: var(--surface);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            height: 650px;
            position: relative;
            transform-style: preserve-3d;
            display: flex; flex-direction: column; padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .hologram-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            padding-bottom: 15px; margin-bottom: 30px;
        }

        .title-unit { display: flex; align-items: center; gap: 12px; }
        .title-unit h2 { font-size: 0.9rem; letter-spacing: 0.2em; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* --- 3D CLUSTER ENGINE --- */
        .cluster-3d-space {
            flex-grow: 1; display: flex; justify-content: center; align-items: center; gap: 40px;
            transform-style: preserve-3d;
        }

        .rack-3d {
            width: 100px; height: 180px; position: relative;
            transform-style: preserve-3d;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateY(-20deg) rotateX(10deg);
        }

        .rack-face { position: absolute; background: #0d1117; border: 1px solid rgba(0, 242, 255, 0.3); }
        .front {
            width: 100px; height: 180px; transform: translateZ(25px);
            display: flex; flex-direction: column; padding: 10px; gap: 8px;
            background: linear-gradient(180deg, #161b22, #0d1117);
        }
        .side { width: 50px; height: 180px; transform: rotateY(90deg) translateZ(75px); background: #080a0e; }
        .top { width: 100px; height: 50px; transform: rotateX(90deg) translateZ(25px); background: #161b22; }

        .rack-led {
            height: 6px; width: 100%; background: rgba(0, 242, 255, 0.1); border-radius: 2px;
            position: relative; overflow: hidden;
        }
        .rack-led::after {
            content: ''; position: absolute; left: 0; top: 0; width: 30%; height: 100%;
            background: var(--primary); box-shadow: 0 0 10px var(--primary);
            animation: data-flow 2s infinite linear;
        }
        @keyframes data-flow { 0% { left: -30%; } 100% { left: 130%; } }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }
        .rack-3d.offline { transform: scale(0.5) translateY(200px) rotateX(90deg); opacity: 0; }

        /* --- 3D PIPELINE CORRIDOR --- */
        .corridor-3d {
            flex-grow: 1; perspective: 1000px; display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d;
        }
        .tube {
            width: 100%; height: 120px; border: 2px dashed rgba(0, 242, 255, 0.1); border-radius: 60px;
            position: relative; transform-style: preserve-3d; transform: rotateX(45deg);
        }
        .p-unit {
            position: absolute; width: 140px; height: 80px; background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--primary); border-radius: 12px;
            top: 20px; left: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateZ(50px); transition: all 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: 0 0 30px var(--primary-glow); backdrop-filter: blur(5px);
        }
        .p-unit.test { background: rgba(255, 204, 0, 0.1); border-color: var(--warning); }
        .p-unit.global { background: rgba(0, 255, 149, 0.1); border-color: var(--success); }
        .p-unit.halted { background: rgba(255, 0, 85, 0.1); border-color: var(--error); }

        /* --- TELEMETRY --- */
        .terminal {
            height: 120px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 10px; padding: 15px; font-family: var(--mono); font-size: 0.7rem; overflow: hidden;
        }
        .log-ln { margin-bottom: 4px; display: flex; gap: 10px; color: #00ff41; }
        .log-ln .ts { color: var(--primary); opacity: 0.6; }

        /* --- CONTROLS --- */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .os-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); padding: 15px; border-radius: 12px;
            color: var(--text); font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.7rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .os-btn:hover:not(:disabled) { background: rgba(0, 242, 255, 0.1); transform: translateZ(10px); }
        .os-btn.danger { color: var(--error); }
        .os-btn:disabled { opacity: 0.2; }
    </style>
</head>
<body>
<div class="scene">
    <div class="viewport">
        <div class="hologram-header">
            <div class="title-unit"><span class="material-symbols-rounded" style="color: var(--primary);">account_tree</span><h2>CLUSTER_CORE v4.0</h2></div>
            <div id="q-status" style="font-size: 0.6rem; color: var(--success); font-weight: 900;">QUORUM: SECURE</div>
        </div>
        <div class="cluster-3d-space">
            <div class="rack-3d" id="rk-1"><div class="rack-face front"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:0.5rem;opacity:0.5;">NODE_01</span><div class="status-dot"></div></div><div class="rack-led"></div><div class="rack-led"></div></div><div class="rack-face side"></div><div class="rack-face top"></div></div>
            <div class="rack-3d" id="rk-2"><div class="rack-face front"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:0.5rem;opacity:0.5;">NODE_02</span><div class="status-dot"></div></div><div class="rack-led"></div><div class="rack-led"></div></div><div class="rack-face side"></div><div class="rack-face top"></div></div>
            <div class="rack-3d" id="rk-3"><div class="rack-face front"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:0.5rem;opacity:0.5;">NODE_03</span><div class="status-dot"></div></div><div class="rack-led"></div><div class="rack-led"></div></div><div class="rack-face side"></div><div class="rack-face top"></div></div>
        </div>
        <div class="terminal" id="c-logs"></div>
        <div class="control-grid">
            <button class="os-btn" onclick="nodeExtract()">Extract Node</button>
            <button class="os-btn danger" onclick="clusterWipe()">Global Wipe</button>
            <button class="os-btn" style="grid-column: span 2;" onclick="resetCluster()">Reset Core</button>
        </div>
    </div>
    <div class="viewport">
        <div class="hologram-header">
            <div class="title-unit"><span class="material-symbols-rounded" style="color: var(--primary);">deployed_code</span><h2>DEPLOY_CORRIDOR_GAC</h2></div>
            <div id="p-status" style="font-size: 0.6rem; color: var(--primary); font-weight: 900;">STATUS: STANDBY</div>
        </div>
        <div class="corridor-3d"><div class="tube"><div id="pkg-3d" class="p-unit"><span style="font-size:0.5rem;opacity:0.6;font-weight:900;">VLAUNCHER_BUNDLE</span><span style="font-weight:900;color:white;">v1.2.4-GA</span></div></div></div>
        <div class="terminal" id="p-logs"></div>
        <div class="control-grid">
            <button class="os-btn" onclick="stageTest()" id="b-test">Inject Test</button>
            <button class="os-btn" onclick="stageGlobal()" id="b-global" disabled>Promote Global</button>
            <button class="os-btn danger" onclick="stageHalt()" id="b-halt" disabled>System Halt</button>
            <button class="os-btn" onclick="resetPipe()">Reset Pipe</button>
        </div>
    </div>
</div>
<script>
    const cLog = document.getElementById('c-logs');
    const pLog = document.getElementById('p-logs');
    function log(el, msg) {
        const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
        const line = document.createElement('div');
        line.className = 'log-ln';
        line.innerHTML = `<span class="ts">[${time}]</span> <span class="msg">${msg}</span>`;
        el.prepend(line);
    }
    function nodeExtract() { document.getElementById('rk-2').classList.add('offline'); log(cLog, "Node_02 extracted. Quorum maintained."); }
    function clusterWipe() { document.querySelectorAll('.rack-3d').forEach(r => r.classList.add('offline')); log(cLog, "GLOBAL_WIPE_COMMAND_EXECUTED"); }
    function resetCluster() { document.querySelectorAll('.rack-3d').forEach(r => r.classList.remove('offline')); log(cLog, "System rebooting..."); }
    const unit = document.getElementById('pkg-3d');
    function stageTest() { unit.style.left = "42%"; unit.classList.add('test'); log(pLog, "Injecting to GAC Test OU."); document.getElementById('b-test').disabled = true; document.getElementById('b-global').disabled = false; document.getElementById('b-halt').disabled = false; }
    function stageGlobal() { unit.style.left = "80%"; unit.classList.add('global'); log(pLog, "Global rollout active."); }
    function stageHalt() { unit.style.left = "20px"; unit.classList.add('halted'); log(pLog, "ANOMALY DETECTED. HALTING."); }
    function resetPipe() { unit.style.left = "20px"; unit.classList.remove('test', 'global', 'halted'); log(pLog, "Resetting..."); document.getElementById('b-test').disabled = false; }
    log(cLog, "System Ready."); log(pLog, "Standby.");
</script>
</body>
</html>
